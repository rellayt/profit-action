name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Test
        run: pytest -q
      - name: Contracts drift check
        working-directory: .
        run: |
          python scripts/export_openapi.py
          python scripts/generate_zod_schemas.py
          git diff --exit-code -- contracts/openapi.json frontend/src/contracts/generated/schemas.ts

  frontend:
    name: Frontend (lint, typecheck, unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Knip
        run: npm run knip
      - name: Typecheck
        run: npm run typecheck
      - name: Unit / integration tests
        run: npm run test

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Smoke E2E
        working-directory: frontend
        run: npm run test:playwright
        env:
          CI: true
